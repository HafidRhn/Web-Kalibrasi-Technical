<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Data MPE (Maximum Permissible Error)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .glass {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
        }

        /* Excel-like style */
        th {
            border-color: #666 !important;
        }

        td {
            border-color: #ccc !important;
        }

        .hover-row:hover {
            background-color: #f8fafc;
        }
    </style>
</head>

<body class="bg-gray-50 text-gray-900 min-h-screen">
    <div class="max-w-[1200px] mx-auto px-4 py-8">
        <!-- Header & Nav -->
        <div class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-3xl font-bold text-gray-800">Master Data MPE</h1>
                <p class="text-gray-500 mt-1">Kelola tabel Batas Kesalahan yang Diizinkan (OIML R-111)</p>
            </div>
            <div class="flex gap-4">
                <a href="index.html"
                    class="bg-white border border-gray-300 hover:bg-gray-50 px-6 py-2.5 rounded-xl font-semibold transition-all shadow-sm flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="m15 18-6-6 6-6" />
                    </svg>
                    Kembali ke Form
                </a>
                <button onclick="resetToDefaults()"
                    class="bg-amber-100 text-amber-700 hover:bg-amber-200 border border-amber-200 px-6 py-2.5 rounded-xl font-semibold transition-all flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8" />
                        <path d="M21 3v5h-5" />
                        <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16" />
                        <path d="M3 21v-5h5" />
                    </svg>
                    Reset Default
                </button>
                <button onclick="openModal()"
                    class="bg-emerald-600 hover:bg-emerald-700 text-white px-6 py-2.5 rounded-xl font-semibold transition-all shadow-lg shadow-emerald-200 flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M5 12h14" />
                        <path d="M12 5v14" />
                    </svg>
                    Tambah Kelas Baru
                </button>
            </div>
        </div>

        <!-- MPE Container -->
        <div id="mpe-container" class="space-y-8">
            <!-- Content injected by JS -->
        </div>
    </div>

    <!-- Modal Add/Edit Class -->
    <div id="modal-class" class="fixed inset-0 bg-black/50 hidden z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-2xl max-h-[90vh] overflow-hidden flex flex-col">
            <div class="p-6 border-b border-gray-100 flex justify-between items-center bg-gray-50">
                <h3 id="modal-title" class="text-xl font-bold text-gray-800">Tambah/Edit Kelas MPE</h3>
                <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M18 6 6 18" />
                        <path d="m6 6 12 12" />
                    </svg>
                </button>
            </div>

            <div class="p-6 overflow-y-auto flex-1">
                <form id="form-class" class="space-y-6">
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">Nama Kelas (contoh: E1, F1, OIML-Custom)</label>
                        <input type="text" id="class-name"
                            class="w-full border border-gray-300 rounded-xl px-4 py-3 focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none text-lg font-semibold"
                            placeholder="Masukkan nama kelas..." required>
                    </div>

                    <div class="border-t border-gray-100 pt-6">
                        <div class="flex justify-between items-center mb-4">
                            <h4 class="font-bold text-gray-800">Daftar Nominal & MPE</h4>
                            <button type="button" onclick="addMpeRow()"
                                class="text-emerald-600 hover:text-emerald-700 text-sm font-bold flex items-center gap-1 bg-emerald-50 px-3 py-1 rounded-lg">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                                    fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                    stroke-linejoin="round">
                                    <path d="M5 12h14" />
                                    <path d="M12 5v14" />
                                </svg>
                                Tambah Baris
                            </button>
                        </div>

                        <div class="border border-gray-200 rounded-xl overflow-hidden">
                            <table class="w-full text-center text-sm">
                                <thead class="bg-gray-50 text-gray-600 font-bold">
                                    <tr>
                                        <th class="border-b border-gray-200 p-3">Nominal (gram)</th>
                                        <th class="border-b border-gray-200 p-3">MPE (mg)</th>
                                        <th class="border-b border-gray-200 p-3 w-16">Aksi</th>
                                    </tr>
                                </thead>
                                <tbody id="mpe-rows-body">
                                    <!-- Rows injected by JS -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </form>
            </div>

            <div class="p-6 border-t border-gray-100 flex justify-end gap-3 bg-gray-50">
                <button onclick="closeModal()"
                    class="px-6 py-2.5 rounded-xl font-semibold text-gray-600 hover:bg-gray-200 transition-all">Batal</button>
                <button onclick="saveClass()"
                    class="bg-emerald-600 hover:bg-emerald-700 text-white px-8 py-2.5 rounded-xl font-semibold transition-all shadow-lg shadow-emerald-100">Simpan Data</button>
            </div>
        </div>
    </div>

    <script>
        const DEFAULT_MPE = {
            'E1': { 50000: 25, 20000: 10, 10000: 5, 5000: 2.5, 2000: 1, 1000: 0.5, 500: 0.25, 200: 0.1, 100: 0.05, 50: 0.03, 20: 0.025, 10: 0.02, 5: 0.016, 2: 0.012, 1: 0.01, 0.5: 0.008, 0.2: 0.006, 0.1: 0.005, 0.05: 0.004, 0.02: 0.003, 0.01: 0.003, 0.005: 0.003, 0.002: 0.003, 0.001: 0.003 },
            'E2': { 1000000: 1600, 500000: 800, 200000: 300, 100000: 160, 50000: 80, 20000: 30, 10000: 16, 5000: 8, 2000: 3, 1000: 1.6, 500: 0.8, 200: 0.3, 100: 0.16, 50: 0.1, 20: 0.08, 10: 0.06, 5: 0.05, 2: 0.04, 1: 0.03, 0.5: 0.025, 0.2: 0.02, 0.1: 0.016, 0.05: 0.012, 0.02: 0.01, 0.01: 0.008, 0.005: 0.006, 0.002: 0.006, 0.001: 0.006 },
            'F1': { 5000000: 25000, 2000000: 10000, 1000000: 5000, 500000: 2500, 200000: 1000, 100000: 500, 50000: 250, 20000: 100, 10000: 50, 5000: 25, 2000: 10, 1000: 5, 500: 2.5, 200: 1, 100: 0.5, 50: 0.3, 20: 0.25, 10: 0.2, 5: 0.16, 2: 0.12, 1: 0.08, 0.5: 0.06, 0.2: 0.05, 0.1: 0.04, 0.05: 0.03, 0.02: 0.025, 0.01: 0.025, 0.005: 0.02, 0.002: 0.02, 0.001: 0.02 },
            'F2': { 5000000: 80000, 2000000: 30000, 1000000: 16000, 500000: 8000, 200000: 3000, 100000: 1600, 50000: 800, 20000: 300, 10000: 160, 5000: 80, 2000: 30, 1000: 16, 500: 8, 200: 3, 100: 1.6, 50: 1, 20: 0.8, 10: 0.6, 5: 0.5, 2: 0.4, 1: 0.3, 0.5: 0.2, 0.2: 0.16, 0.1: 0.12, 0.05: 0.1, 0.02: 0.08, 0.01: 0.08, 0.005: 0.06, 0.002: 0.06, 0.001: 0.06 },
            'M1': { 5000000: 250000, 2000000: 100000, 1000000: 50000, 500000: 25000, 200000: 10000, 100000: 5000, 50000: 2500, 20000: 1000, 10000: 500, 5000: 250, 2000: 100, 1000: 50, 500: 25, 200: 10, 100: 5, 50: 3, 20: 2.5, 10: 2, 5: 1.6, 2: 1.2, 1: 1, 0.5: 0.8, 0.2: 0.6, 0.1: 0.5, 0.05: 0.4, 0.02: 0.3, 0.01: 0.25, 0.005: 0.2, 0.002: 0.2, 0.001: 0.2 }
        };

        let masterMpe = JSON.parse(localStorage.getItem('masterMPE') || JSON.stringify(DEFAULT_MPE));
        let editingClassName = null;

        function renderMpeData() {
            const container = document.getElementById('mpe-container');
            container.innerHTML = '';

            Object.entries(masterMpe).forEach(([className, values]) => {
                const section = document.createElement('div');
                section.className = "bg-white rounded-2xl shadow-md border border-gray-200 overflow-hidden";

                const sortedNoms = Object.keys(values).map(Number).sort((a, b) => b - a);

                let rowsHtml = sortedNoms.map(nom => {
                    let nomDisplay = "";
                    if (nom >= 1000) nomDisplay = (nom / 1000) + ' kg';
                    else if (nom >= 1) nomDisplay = nom + ' g';
                    else nomDisplay = Math.round(nom * 1000) + ' mg';

                    return `
                        <tr class="hover-row">
                            <td class="border-b border-gray-100 p-2 font-medium text-gray-700">${nomDisplay}</td>
                            <td class="border-b border-gray-100 p-2 text-gray-600">${values[nom].toLocaleString('id-ID')} mg</td>
                        </tr>
                    `;
                }).join('');

                section.innerHTML = `
                    <div class="bg-gray-50 px-6 py-4 flex justify-between items-center border-b border-gray-200">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 bg-emerald-100 text-emerald-700 rounded-xl flex items-center justify-center font-bold text-lg">
                                ${className[0]}
                            </div>
                            <h3 class="text-xl font-bold text-gray-800">Kelas ${className}</h3>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="editClass('${className}')" class="text-blue-600 hover:bg-blue-50 px-4 py-2 rounded-lg font-bold text-sm transition-all border border-blue-100">
                                EDIT
                            </button>
                            <button onclick="deleteClass('${className}')" class="text-red-600 hover:bg-red-50 px-4 py-2 rounded-lg font-bold text-sm transition-all border border-red-100">
                                HAPUS
                            </button>
                        </div>
                    </div>
                    <div class="p-6">
                        <table class="w-full text-center text-sm border-collapse">
                            <thead>
                                <tr class="text-gray-400 font-bold uppercase text-[10px] tracking-wider">
                                    <th class="border-b border-gray-200 p-2">Nominal</th>
                                    <th class="border-b border-gray-200 p-2">MPE</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${rowsHtml}
                            </tbody>
                        </table>
                    </div>
                `;
                container.appendChild(section);
            });
        }

        function openModal(className = null) {
            editingClassName = className;
            const modal = document.getElementById('modal-class');
            const nameInput = document.getElementById('class-name');
            const rowsBody = document.getElementById('mpe-rows-body');
            const title = document.getElementById('modal-title');

            rowsBody.innerHTML = '';

            if (className) {
                title.innerText = `Edit Kelas ${className}`;
                nameInput.value = className;
                const values = masterMpe[className];
                const sortedNoms = Object.keys(values).map(Number).sort((a, b) => b - a);
                sortedNoms.forEach(nom => {
                    addMpeRow(nom, values[nom]);
                });
            } else {
                title.innerText = 'Tambah Kelas Baru';
                nameInput.value = '';
                addMpeRow();
            }

            modal.classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('modal-class').classList.add('hidden');
        }

        function addMpeRow(nominal = '', mpe = '') {
            const tbody = document.getElementById('mpe-rows-body');
            const tr = document.createElement('tr');
            tr.className = "hover:bg-gray-50";
            tr.innerHTML = `
                <td class="p-2 border-b border-gray-100">
                    <input type="number" step="any" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-center nom-val" value="${nominal}" placeholder="0.001">
                </td>
                <td class="p-2 border-b border-gray-100">
                    <input type="number" step="any" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-center mpe-val" value="${mpe}" placeholder="0.5">
                </td>
                <td class="p-2 border-b border-gray-100">
                    <button type="button" onclick="this.parentElement.parentElement.remove()" class="text-red-400 hover:text-red-600 p-2">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
                    </button>
                </td>
            `;
            tbody.appendChild(tr);
        }

        function saveClass() {
            const nameInput = document.getElementById('class-name');
            const newName = nameInput.value.trim().toUpperCase();

            if (!newName) {
                alert('Nama kelas harus diisi');
                return;
            }

            const rows = document.querySelectorAll('#mpe-rows-body tr');
            const newValues = {};

            rows.forEach(row => {
                const nom = parseFloat(row.querySelector('.nom-val').value);
                const mpe = parseFloat(row.querySelector('.mpe-val').value);

                if (!isNaN(nom) && !isNaN(mpe)) {
                    newValues[nom] = mpe;
                }
            });

            if (Object.keys(newValues).length === 0) {
                alert('Minimal harus ada 1 data nominal & mpe');
                return;
            }

            // If renaming or adding new
            if (editingClassName && editingClassName !== newName) {
                delete masterMpe[editingClassName];
            }

            masterMpe[newName] = newValues;
            
            saveToStorage();
            closeModal();
            renderMpeData();
        }

        function editClass(name) {
            openModal(name);
        }

        function deleteClass(name) {
            if (confirm(`Apakah Anda yakin ingin menghapus seluruh data Kelas ${name}?`)) {
                delete masterMpe[name];
                saveToStorage();
                renderMpeData();
            }
        }

        function resetToDefaults() {
            if (confirm('Apakah Anda yakin ingin mengembalikan tabel MPE ke standar OIML? Seluruh perubahan kustom Anda akan hilang.')) {
                masterMpe = JSON.parse(JSON.stringify(DEFAULT_MPE));
                saveToStorage();
                renderMpeData();
            }
        }

        function saveToStorage() {
            localStorage.setItem('masterMPE', JSON.stringify(masterMpe));
        }

        // Initialize
        renderMpeData();
    </script>
</body>

</html>
